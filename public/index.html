<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riverflow Batch</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <h1>Riverflow Batch</h1>
          <p>sourceful/riverflow-v2.5-pro:free</p>
        </div>
        <nav class="tabs" aria-label="Views">
          <button id="generateTab" class="tab active" type="button" data-view="generateView">生图</button>
          <button id="keyPoolTab" class="tab" type="button" data-view="keyPoolView">key池管理</button>
        </nav>
        <span id="serverState" class="status idle">Ready</span>
      </header>

      <section id="generateView" class="view active">
        <section class="workspace">
          <div class="panel controls">
            <div class="title-row">
              <div>
                <h2>生图</h2>
                <p id="keyPoolSummary">No ready keys</p>
              </div>
            </div>

            <label class="field">
              <span>Prompt</span>
              <textarea id="prompt" rows="6" placeholder="Example: a cinematic product photo of a translucent glass teapot on a walnut table, morning light"></textarea>
            </label>

            <div class="template-row">
              <input id="templateName" type="text" placeholder="Template name" />
              <button id="saveTemplateButton" type="button" class="secondary">Save</button>
            </div>

            <div class="template-row">
              <select id="templateSelect" aria-label="Prompt templates"></select>
              <button id="loadTemplateButton" type="button" class="secondary">Load</button>
              <button id="deleteTemplateButton" type="button" class="secondary danger">Delete</button>
            </div>

            <label class="field">
              <span>Prompt queue</span>
              <textarea id="promptList" rows="7" placeholder="One prompt per line. When filled, this queue overrides request count."></textarea>
            </label>

            <div class="grid-fields">
              <label class="field">
                <span>Request count</span>
                <input id="count" type="number" min="1" max="24" value="4" />
              </label>
              <label class="field">
                <span>Per-key concurrency</span>
                <input id="concurrency" type="number" min="1" max="8" value="3" />
              </label>
            </div>

            <label class="toggle-row">
              <input id="queueMode" type="checkbox" />
              <span>Queue mode: force 1 per key and wait</span>
            </label>

            <div class="grid-fields">
              <label class="field">
                <span>Retry count</span>
                <input id="retryMax" type="number" min="0" max="10" value="3" />
              </label>
              <label class="field">
                <span>Wait seconds</span>
                <input id="retryDelaySeconds" type="number" min="5" max="600" value="70" />
              </label>
            </div>

            <div class="grid-fields">
              <label class="field">
                <span>Image size</span>
                <select id="imageSize">
                  <option value="auto">Auto</option>
                  <option value="1K">1K</option>
                  <option value="2K">2K</option>
                  <option value="4K">4K</option>
                </select>
              </label>
              <label class="field">
                <span>Aspect ratio</span>
                <select id="aspectRatio">
                  <option value="auto">Auto</option>
                  <option value="1:1">1:1</option>
                  <option value="16:9">16:9</option>
                  <option value="9:16">9:16</option>
                  <option value="4:3">4:3</option>
                  <option value="3:4">3:4</option>
                  <option value="3:2">3:2</option>
                  <option value="2:3">2:3</option>
                </select>
              </label>
            </div>

            <div class="actions">
              <button id="runButton" type="button">Start batch</button>
              <button id="clearButton" type="button" class="secondary">Clear</button>
            </div>
          </div>

          <div class="results-wrap">
            <div class="toolbar">
              <div>
                <h2>Results</h2>
                <p id="progressText">Waiting for tasks</p>
              </div>
              <progress id="progressBar" max="1" value="0"></progress>
            </div>
            <section id="results" class="results"></section>
          </div>
        </section>
      </section>

      <section id="keyPoolView" class="view">
        <div class="key-page">
          <section class="panel key-manager">
            <div class="title-row">
              <div>
                <h2>key池管理</h2>
                <p>Manage local OpenRouter API keys and quota status.</p>
              </div>
            </div>

            <label class="field">
              <span>OpenRouter API keys</span>
              <input id="apiKeyInput" type="password" autocomplete="off" placeholder="Paste one key, then add to pool" />
            </label>

            <div class="template-row">
              <button id="addApiKeyButton" type="button" class="secondary">Add to key pool</button>
              <button id="refreshQuotaButton" type="button" class="secondary">Refresh quota</button>
              <button id="clearApiKeysButton" type="button" class="secondary danger">Clear keys</button>
            </div>

            <textarea id="apiKeysBulk" class="compact-area" rows="5" placeholder="Or paste multiple keys here, one per line"></textarea>
            <div id="apiKeyList" class="key-list" aria-live="polite"></div>
          </section>
        </div>
      </section>
    </main>
    <script src="/app.js" type="module"></script>
  </body>
</html>
